<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BriefAI | Transform Messy Notes into Professional Briefs</title>
    <meta name="description" content="BriefAI uses AI to turn unstructured brand emails and notes into clear, professional creator briefs in seconds.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">BriefAI</div>
            <div class="actions-top">
                <button id="settingsBtn" class="btn-icon" title="AI Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </header>

        <main>
            <!-- Left Pane: Input -->
            <section class="pane" id="inputPane">
                <div class="pane-header">
                    <h2>Unstructured Input</h2>
                    <span id="charCount" style="font-size: 0.75rem; color: var(--text-secondary)">0 characters</span>
                </div>
                <div class="pane-content">
                    <textarea id="rawInput" placeholder="Paste your brand email, bullet points, or rough campaign notes here..."></textarea>
                    <button id="generateBtn" class="btn-primary">
                        <span class="btn-text">Generate Brief</span>
                        <div class="loading-dots" id="loadingDots">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </button>
                </div>
            </section>

            <!-- Right Pane: Output -->
            <section class="pane" id="outputPane">
                <div class="pane-header">
                    <h2>Generated Brief</h2>
                    <div class="actions-top">
                        <button id="regenerateBtn" class="btn-icon" title="Regenerate" style="display: none;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                        </button>
                        <button id="copyBtn" class="btn-icon" title="Copy to Clipboard" style="display: none;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="pane-content" id="outputContent">
                    <div class="empty-state" id="emptyState">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        <p>Your structured brief will appear here.</p>
                    </div>
                    <div id="briefResult" class="brief-container" style="display: none;">
                        <!-- Brief sections will be injected here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>AI Settings</h2>
            <p>To generate briefs, enter your Google Gemini API Key. This is stored locally in your browser.</p>
            <div class="input-group">
                <label for="apiKey">Gemini API Key</label>
                <input type="password" id="apiKey" placeholder="Enter your API key...">
            </div>
            <div class="modal-actions">
                <button class="btn-ghost" id="closeModal">Cancel</button>
                <button class="btn-primary" id="saveKey">Save Settings</button>
            </div>
        </div>
    </div>

    <div id="copyToast" class="copy-toast">Brief copied to clipboard!</div>

    <script src="ai_service.js"></script>
    <script src="app.js"></script>
</body>
</html>
